# Navigation Links
#   Homepage sections are linked with an absolute hash, e.g. `/#research`, so the
#     link works from any page. Standalone widget pages link to their URL, e.g. `/talks/`.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: '/'
    weight: 10
  - name: Research
    url: '/research/'
    weight: 20
  - name: Software
    url: '/software/'
    weight: 30
  - name: Talks & Teaching
    url: '/talks/'
    weight: 40
  - name: Group
    url: '/group/'
    weight: 50
  - name: CV
    url: uploads/Yihan-Wang-CV.pdf
    weight: 60
