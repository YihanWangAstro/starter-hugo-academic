# SITE SETUP
# Guide: https://docs.hugoblox.com/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance

appearance:
  theme_day: geek
  theme_night: geek
  font: geek
  font_size: XS

# SEO

marketing:
  seo:
    site_type: Person
    local_business_type: 'Academic Website'
    org_name: 'University of Hong Kong'
    description: 'Yihan Wang — theoretical and computational astrophysicist, incoming Assistant Professor at the University of Hong Kong (HKIAA) in Fall 2026. Research on the few-body gravitational dynamics of dense stellar environments and AGN accretion disks, producing nuclear transients and gravitational-wave sources. Developer of SpaceHub and VegasAfterglow.'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
  verification:
    google: ''
    baidu: ''

# Site header

header:
  navbar:
    enable: true
    align: l
    show_logo: true
    show_language: false
    show_day_night: true
    show_search: true
    highlight_active_link: true

# Site footer

footer:
  copyright:
    notice: '© {year} Yihan Wang. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

# Site features

features:
  syntax_highlighter:
    enable: true
    extra_languages:
      - r
      - latex
  math:
    enable: true
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/YihanWangAstro/YihanWang.github.io'
    content_dir: content
    branch: master
  avatar:
    gravatar: false
    shape: square
  comment:
    provider: ''
    disqus:
      shortname: ''
      show_count: true
    commento:
      url: ''
  search:
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: ''
    api_key: ''
    zoom: 15

# Extensions

extensions:
  cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# Security

security:
  # Allow frame for embedding speaker notes in slides
  allow_frame: true
